<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <meta name="theme-color" content="#2b1609">

  <title>JuniorGame</title>

  <link
    rel="stylesheet"
    href="css/menu-v2.css?v=2"
  >
</head>

<body>

  <main class="menu-page">

    <div
      class="menu-darkness"
      aria-hidden="true"
    ></div>

    <section class="menu-content">

      <!-- LETRERO PRINCIPAL -->
      <header class="game-logo">

        <span
          class="logo-screw logo-screw-left"
          aria-hidden="true"
        ></span>

        <span
          class="logo-screw logo-screw-right"
          aria-hidden="true"
        ></span>

        <span
          class="logo-leaf logo-leaf-left"
          aria-hidden="true"
        >
          🍃
        </span>

        <span
          class="logo-leaf logo-leaf-right"
          aria-hidden="true"
        >
          🍃
        </span>

        <div
          class="logo-top-paw"
          aria-hidden="true"
        >
          🐾
        </div>

        <div
          class="logo-title"
          aria-label="Junior"
        >

          <span class="logo-letter">J</span>
          <span class="logo-letter">U</span>
          <span class="logo-letter">N</span>
          <span class="logo-letter">I</span>

          <span class="logo-o">
            <span class="logo-letter">O</span>

            <span
              class="logo-o-paw"
              aria-hidden="true"
            >
              🐾
            </span>
          </span>

          <span class="logo-letter">R</span>

        </div>

        <div class="logo-game">
          GAME
        </div>

        <div
          class="logo-decoration"
          aria-hidden="true"
        >
          <span class="logo-small-paw">🐾</span>
          <span class="logo-bone">🦴</span>
          <span class="logo-small-paw">🐾</span>
        </div>

      </header>

      <!-- BOTONES DEL MENÚ -->
      <nav
        class="menu-buttons"
        aria-label="Menú principal"
      >

        <a
          class="wood-button play-button"
          href="game.html"
        >
          <span
            class="button-icon"
            aria-hidden="true"
          >
            🐾
          </span>

          <span class="button-text">
            JUGAR
          </span>
        </a>

        <button
          id="recordsButton"
          class="wood-button"
          type="button"
        >
          <span
            class="button-icon"
            aria-hidden="true"
          >
            🏆
          </span>

          <span class="button-text">
            RÉCORDS
          </span>
        </button>

        <button
          id="settingsButton"
          class="wood-button"
          type="button"
        >
          <span
            class="button-icon"
            aria-hidden="true"
          >
            ⚙️
          </span>

          <span class="button-text">
            AJUSTES
          </span>
        </button>

        <button
          id="howToPlayButton"
          class="wood-button"
          type="button"
        >
          <span
            class="button-icon"
            aria-hidden="true"
          >
            ℹ️
          </span>

          <span class="button-text">
            CÓMO JUGAR
          </span>
        </button>

        <button
          id="exitButton"
          class="wood-button"
          type="button"
        >
          <span
            class="button-icon"
            aria-hidden="true"
          >
            🚪
          </span>

          <span class="button-text">
            SALIR
          </span>
        </button>

      </nav>

      <!-- PIE DEL MENÚ -->
      <footer class="menu-footer">

        <strong>
          JFAM &amp; Co. Game Studios
        </strong>

        <span>
          Versión 1.0
        </span>

      </footer>

    </section>

    <!-- VENTANA EMERGENTE -->
    <div
      id="menuModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >

      <div class="modal-card">

        <button
          id="closeModalButton"
          class="modal-close"
          type="button"
          aria-label="Cerrar ventana"
        >
          ×
        </button>

        <div
          id="modalIcon"
          class="modal-icon"
          aria-hidden="true"
        >
          🐾
        </div>

        <h2 id="modalTitle">
          Próximamente
        </h2>

        <p id="modalText">
          Esta sección estará disponible próximamente.
        </p>

        <button
          id="acceptModalButton"
          class="modal-accept"
          type="button"
        >
          ENTENDIDO
        </button>

      </div>

    </div>

   <div class="dog-platform">
    <img src="Fondos-JuniorGame/Caja.png"
     class="dog-wood" alt="">
    <img src="Fondos-JuniorGame/Estrella.png"
     class="menu-dog" alt="Estrella">
   </div>

  </main>

<script
  type="module"
  src="js/menu-auth.js?v=1"
></script>

  <script src="js/menu.js?v=20"></script>

</body>

</html>
