<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0,
    maximum-scale=1.0, user-scalable=no,
    viewport-fit=cover"
  >

  <meta name="theme-color" content="#40200d">

  <title>JuniorGame</title>

  <link rel="stylesheet" href="css/menu.css?v=10">
</head>

<body>

  <main class="menu-page">

    <div class="menu-shade" aria-hidden="true"></div>

    <section class="menu-content">

      <!-- LETRERO PRINCIPAL -->
      <header class="game-logo">

        <span class="logo-screw logo-screw-left"></span>
        <span class="logo-screw logo-screw-right"></span>

        <span class="logo-leaves logo-leaves-left">🍃</span>
        <span class="logo-leaves logo-leaves-right">🍃</span>

        <div class="logo-paw-top">🐾</div>

        <div class="logo-title" aria-label="Junior">
          <span class="logo-letter">J</span>
          <span class="logo-letter">U</span>
          <span class="logo-letter">N</span>
          <span class="logo-letter">I</span>

          <span class="logo-o">
            <span class="logo-letter">O</span>
            <span class="logo-o-paw">🐾</span>
          </span>

          <span class="logo-letter">R</span>
        </div>

        <div class="logo-game">GAME</div>

        <div class="logo-bottom-decoration">
          <span class="small-paw">🐾</span>
          <span class="logo-bone">🦴</span>
          <span class="small-paw">🐾</span>
        </div>

      </header>

      <!-- BOTONES -->
      <nav class="menu-buttons" aria-label="Menú principal">

        <a
          class="wood-button play-button"
          href="game.html"
        >
          <span class="button-icon">🐾</span>
          <span class="button-text">JUGAR</span>
        </a>

        <button
          id="recordsButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">🏆</span>
          <span class="button-text">RÉCORDS</span>
        </button>

        <button
          id="settingsButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">⚙️</span>
          <span class="button-text">AJUSTES</span>
        </button>

        <button
          id="howToPlayButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">ℹ️</span>
          <span class="button-text">CÓMO JUGAR</span>
        </button>

        <button
          id="exitButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">🚪</span>
          <span class="button-text">SALIR</span>
        </button>

      </nav>

      <footer class="menu-footer">
        <strong>JFAM &amp; Co. Game Studios</strong>
        <span>Versión 1.0</span>
      </footer>

    </section>

    <!-- VENTANA INFORMATIVA -->
    <div
      id="menuModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >

      <div class="modal-card">

        <button
          id="closeModalButton"
          class="modal-close"
          type="button"
          aria-label="Cerrar"
        >
          ×
        </button>

        <div id="modalIcon" class="modal-icon">🐾</div>

        <h2 id="modalTitle">Próximamente</h2>

        <p id="modalText">
          Esta sección estará disponible próximamente.
        </p>

        <button
          id="acceptModalButton"
          class="modal-accept"
          type="button"
        >
          ENTENDIDO
        </button>

      </div>

    </div>

  </main>

  <script src="js/menu.js?v=10"></script>

</body>
</html>
