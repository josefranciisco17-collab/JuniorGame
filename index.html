<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <title>JuniorGame</title>

<link rel="stylesheet" href="css/menu.css?v=3">
</head>

<body>

  <main class="menu-page">

    <div class="menu-overlay"></div>

    <section class="menu-content">


<div class="game-logo">

  <div class="logo-title">
    <span class="logo-word">JUNI</span>

    <span class="logo-o">
      <span class="logo-o-letter">O</span>
      <span class="logo-o-paw">🐾</span>
    </span>

    <span class="logo-word">R</span>
  </div>

  <div class="logo-game">GAME</div>

  <div class="logo-decoration">
    <span>🐾</span>
    <span>🦴</span>
    <span>🐾</span>
  </div>

</div>

      <nav class="menu-buttons">

        <a
          class="wood-button play-button"
          href="game.html"
        >
          <span class="button-icon">🐾</span>
          <span>JUGAR</span>
        </a>

        <button
          id="recordsButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">🏆</span>
          <span>RÉCORDS</span>
        </button>

        <button
          id="settingsButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">⚙️</span>
          <span>AJUSTES</span>
        </button>

        <button
          id="howToPlayButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">ℹ️</span>
          <span>CÓMO JUGAR</span>
        </button>

        <button
          id="exitButton"
          class="wood-button"
          type="button"
        >
          <span class="button-icon">🚪</span>
          <span>SALIR</span>
        </button>

      </nav>

      <footer class="menu-footer">
        <span>JFAM &amp; Co. Game Studios</span>
        <span>Versión 1.0</span>
      </footer>

    </section>

    <div
      id="comingSoonModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >

      <div class="modal-card">

        <button
          id="closeModalButton"
          class="modal-close"
          type="button"
          aria-label="Cerrar"
        >
          ×
        </button>

        <h2 id="modalTitle">Próximamente</h2>

        <p id="modalText">
          Esta sección estará disponible en una próxima actualización.
        </p>

        <button
          id="acceptModalButton"
          class="modal-accept"
          type="button"
        >
          Entendido
        </button>

      </div>

    </div>

  </main>

  <script src="js/menu.js"></script>

</body>

</html>
