<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <title>JuniorGame - Juego</title>

  <link rel="stylesheet" href="css/game.css">
</head>

<body>

  <main id="game">

    <header class="game-hud">

      <div class="score-box">
        <img
          src="Fondos-JuniorGame/hueso.png"
          alt="Hueso"
          draggable="false"
        >

        <span id="score">0</span>
      </div>


<div class="level-bar">

    <div
        id="levelProgress"
        class="level-bar-fill">
    </div>

</div>

<div class="level-label">
    ⭐ Nivel <span id="levelNumber">1</span>
</div>

      <div class="lives" id="lives">
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
      </div>

      <a
        class="home-button"
        href="index.html"
        aria-label="Volver al menú"
      >
        🏠
      </a>

    </header>

    <section id="gameArea" class="game-area">

      <div id="boneLayer" class="bone-layer"></div>

      <img
        id="dog"
        class="dog"
        src="Fondos-JuniorGame/usuario1.png"
        alt="Perro del juego"
        draggable="false"
      >

    </section>

    <nav class="controls">

      <button
        id="leftButton"
        class="control-button movement-button"
        type="button"
        aria-label="Mover a la izquierda"
      >
        ◀
      </button>

      <button
        id="jumpButton"
        class="control-button jump-button"
        type="button"
        aria-label="Saltar"
      >
        ▲
        <span>SALTAR</span>
      </button>

      <button
        id="rightButton"
        class="control-button movement-button"
        type="button"
        aria-label="Mover a la derecha"
      >
        ▶
      </button>

    </nav>

  </main>

<div
  id="gameOverModal"
  class="game-over-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="gameOverTitle"
>
  <div class="game-over-card">

    <div class="game-over-icon">
      🐶
    </div>

    <h2 id="gameOverTitle">
      PARTIDA TERMINADA
    </h2>

    <div class="game-over-stats">

      <div class="game-over-stat">
        <span>Huesos de esta ronda</span>
        <strong id="gameOverRoundBones">0</strong>
      </div>

      <div class="game-over-stat">
        <span>Récord de huesos</span>
        <strong id="gameOverRecordBones">0</strong>
      </div>

      <div class="game-over-stat">
        <span>Total acumulado</span>
        <strong id="gameOverTotalBones">0</strong>
      </div>

    </div>

    <button
      id="playAgainButton"
      class="game-over-button primary"
      type="button"
    >
      JUGAR OTRA VEZ
    </button>

    <button
      id="backToMenuButton"
      class="game-over-button secondary"
      type="button"
    >
      VOLVER AL MENÚ
    </button>

  </div>
</div>

  <script src="js/niveles.js"></script>
  <script src="js/obstaculos.js"></script>
  <script src="js/game.js"></script>
  <script src="js/player.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/bones.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
